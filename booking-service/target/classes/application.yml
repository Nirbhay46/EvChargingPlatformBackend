server:
  port: 8083

spring:
  application:
    name: booking-service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/bookingdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate: { ddl-auto: validate }
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      acks: all

clients:
  station-service:
    url: ${STATION_SERVICE_URL:http://localhost:8082}

resilience4j:
  circuitbreaker:
    instances:
      station:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    instances:
      station:
        max-attempts: 3
        wait-duration: 500ms
        exponential-backoff-multiplier: 2

management:
  endpoints:
    web:
      exposure: { include: health, info, prometheus, circuitbreakers, retries }
  tracing:
    sampling: { probability: 1.0 }
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"
