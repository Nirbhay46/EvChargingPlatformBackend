server:
  port: 8085

spring:
  application:
    name: notification-service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/notificationdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate: { ddl-auto: validate }
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}

aws:
  ses:
    endpoint: ${SES_ENDPOINT:http://localhost:4566}
  region: ${AWS_REGION:ap-southeast-2}
  accessKey: ${AWS_ACCESS_KEY_ID:test}
  secretKey: ${AWS_SECRET_ACCESS_KEY:test}

notification:
  from-email: ${FROM_EMAIL:no-reply@evcharge.io}

management:
  endpoints:
    web:
      exposure: { include: health, info, prometheus }
  tracing:
    sampling: { probability: 1.0 }
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"
