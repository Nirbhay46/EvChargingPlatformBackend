server:
  port: 8082

spring:
  application:
    name: station-service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/stationdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate: { ddl-auto: validate }
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s
  cache:
    type: redis
    redis:
      time-to-live: 60s     # 60 second TTL on station entries
      cache-null-values: false
      use-key-prefix: true
      key-prefix: "ev:station:"

management:
  endpoints:
    web:
      exposure: { include: health, info, prometheus, caches }
  tracing:
    sampling: { probability: 1.0 }
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"
